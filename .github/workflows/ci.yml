name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.301

      - name: Restore
        run: dotnet restore .\ClipForge.slnx

      - name: Build
        run: dotnet build .\ClipForge.slnx --configuration Release --no-restore

      - name: Run deterministic tests
        run: dotnet run --project .\tests\ClipForge.Tests\ClipForge.Tests.csproj --configuration Release --no-build
