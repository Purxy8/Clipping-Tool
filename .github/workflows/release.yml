name: Release ClipForge

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to release (for example, 1.0.0)"
        required: true
        type: string
      release_notes:
        description: "Optional Markdown release notes"
        required: false
        type: string
      publish:
        description: "Publish immediately instead of creating a draft GitHub release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: clipforge-release
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and upload
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 45
    environment:
      name: release
    env:
      RELEASE_DIRECTORY: artifacts\Distribution
      UPDATE_URL: https://github.com/${{ github.repository }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.301
            8.0.x

      - name: Restore dependencies and local release tool
        shell: pwsh
        run: |
          dotnet restore .\ClipForge.slnx --locked-mode
          dotnet restore .\src\ClipForge\ClipForge.csproj --runtime win-x64 --locked-mode
          dotnet tool restore

      - name: Select signing mode
        id: signing
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
          HAS_WINDOWS_SIGNING_PFX: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 != '' }}
          HAS_WINDOWS_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD != '' }}
          HAS_AZURE_SIGNING_METADATA: ${{ secrets.AZURE_SIGNING_METADATA_JSON != '' }}
          HAS_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID != '' }}
          HAS_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID != '' }}
          HAS_AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}
          HAS_EXPECTED_SIGNING_SUBJECT: ${{ secrets.WINDOWS_SIGNING_SUBJECT != '' }}
        run: |
          $hasPfx = [Convert]::ToBoolean($env:HAS_WINDOWS_SIGNING_PFX)
          $hasPfxPassword = [Convert]::ToBoolean($env:HAS_WINDOWS_SIGNING_PASSWORD)
          $hasAzure = [Convert]::ToBoolean($env:HAS_AZURE_SIGNING_METADATA)
          $hasExpectedSubject = [Convert]::ToBoolean($env:HAS_EXPECTED_SIGNING_SUBJECT)

          if ($hasPfx -ne $hasPfxPassword) {
            throw "Configure both WINDOWS_SIGNING_PFX_BASE64 and WINDOWS_SIGNING_PFX_PASSWORD, or neither."
          }
          if ($hasPfx -and $hasAzure) {
            throw "Configure either PFX signing or Azure Artifact Signing, not both."
          }
          if (($hasPfx -or $hasAzure) -and -not $hasExpectedSubject) {
            throw "Signed releases also require WINDOWS_SIGNING_SUBJECT for publisher verification."
          }

          if ($hasAzure) {
            $missingAzureCredential = (
              -not [Convert]::ToBoolean($env:HAS_AZURE_CLIENT_ID) -or
              -not [Convert]::ToBoolean($env:HAS_AZURE_TENANT_ID) -or
              -not [Convert]::ToBoolean($env:HAS_AZURE_SUBSCRIPTION_ID))
            if ($missingAzureCredential) {
              throw "Azure signing also requires AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID."
            }
            "mode=azure" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          elseif ($hasPfx) {
            "mode=pfx" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            if (-not $env:CLIPFORGE_VERSION.Contains("-")) {
              throw "Unsigned artifacts are allowed only for explicitly versioned prereleases."
            }
            Write-Warning "No signing secrets are configured. This run will produce unsigned artifacts."
            "mode=unsigned" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Download the previous Velopack release
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releases = @()
          $page = 1
          do {
            $releasePage = @(
              Invoke-RestMethod `
                -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases?per_page=100&page=$page" `
                -Headers $headers)
            $releases += $releasePage
            $page++
          } while ($releasePage.Count -eq 100)

          $requestedTag = "v$env:CLIPFORGE_VERSION"
          if (@($releases.tag_name) -contains $requestedTag) {
            throw "Release tag $requestedTag already exists. Increment the version instead of replacing it."
          }

          $requestedCore = [Version]($env:CLIPFORGE_VERSION.Split('-', 2)[0])
          $isPrerelease = $env:CLIPFORGE_VERSION.Contains('-')
          $stableVersions = @(
            $releases |
              Where-Object {
                -not $_.prerelease -and
                $_.tag_name -match '^v?(\d+)\.(\d+)\.(\d+)$'
              } |
              ForEach-Object { [Version]$_.tag_name.TrimStart('v') })
          if ($stableVersions.Count -gt 0) {
            $highestStable = $stableVersions | Sort-Object -Descending | Select-Object -First 1
            if (($isPrerelease -and $requestedCore -le $highestStable) -or
                (-not $isPrerelease -and $requestedCore -le $highestStable)) {
              throw "Requested version $env:CLIPFORGE_VERSION is not newer than stable release $highestStable."
            }
          }

          $eligibleFeedReleases = @(
            $releases | Where-Object {
              -not $_.draft -and [bool]$_.prerelease -eq $isPrerelease
            })
          $hasVelopackFeed = @(
            $eligibleFeedReleases.assets |
              Where-Object { $_.name -match '^releases\..+\.json(?:\.zst)?$' }).Count -gt 0

          if ($hasVelopackFeed) {
            $downloadArguments = @(
              "tool", "run", "vpk", "--",
              "download", "github",
              "--repoUrl", $env:UPDATE_URL,
              "--token", $env:GITHUB_TOKEN,
              "--channel", "stable",
              "--outputDir", $env:RELEASE_DIRECTORY)
            if ($isPrerelease) {
              $downloadArguments += "--pre"
            }
            & dotnet @downloadArguments
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          else {
            Write-Host "No previous eligible published Velopack feed was found; creating a full release."
          }

      - name: Prepare and test release payload
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
        run: |
          & .\scripts\release.ps1 `
            -Version $env:CLIPFORGE_VERSION `
            -UpdateUrl $env:UPDATE_URL `
            -OutputDirectory $env:RELEASE_DIRECTORY `
            -NoRestore `
            -PrepareOnly

      - name: Sign in to Azure for Artifact Signing
        if: steps.signing.outputs.mode == 'azure'
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare PFX signing material
        if: steps.signing.outputs.mode == 'pfx'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "clipforge-signing.pfx"
          [System.IO.File]::WriteAllBytes(
            $pfxPath,
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))

          $password = ConvertTo-SecureString $env:WINDOWS_SIGNING_PFX_PASSWORD -AsPlainText -Force
          $importedCertificates = @(
            Import-PfxCertificate `
              -FilePath $pfxPath `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password $password)

          $importedThumbprints = @(
            $importedCertificates |
              Select-Object -ExpandProperty Thumbprint -Unique)
          "IMPORTED_SIGNING_THUMBPRINTS=$($importedThumbprints -join ';')" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $codeSigningCertificates = @(
            $importedCertificates | Where-Object {
              if (-not $_.HasPrivateKey) {
                return $false
              }

              foreach ($extension in $_.Extensions) {
                if ($extension.Oid.Value -ne '2.5.29.37') {
                  continue
                }
                $enhancedKeyUsage = [System.Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]$extension
                if (@($enhancedKeyUsage.EnhancedKeyUsages.Value) -contains '1.3.6.1.5.5.7.3.3') {
                  return $true
                }
              }
              return $false
            })
          if ($codeSigningCertificates.Count -ne 1) {
            throw "The PFX must contain exactly one private-key certificate with the Code Signing EKU. Found $($codeSigningCertificates.Count)."
          }

          "SIGNING_THUMBPRINT=$($codeSigningCertificates[0].Thumbprint)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Azure signing metadata
        if: steps.signing.outputs.mode == 'azure'
        shell: pwsh
        env:
          AZURE_SIGNING_METADATA_JSON: ${{ secrets.AZURE_SIGNING_METADATA_JSON }}
        run: |
          $metadataPath = Join-Path $env:RUNNER_TEMP "clipforge-azure-signing.json"
          [System.IO.File]::WriteAllText(
            $metadataPath,
            $env:AZURE_SIGNING_METADATA_JSON,
            [System.Text.UTF8Encoding]::new($false))

      - name: Package release
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
          AZURE_CLIENT_ID: ${{ steps.signing.outputs.mode == 'azure' && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_TENANT_ID: ${{ steps.signing.outputs.mode == 'azure' && secrets.AZURE_TENANT_ID || '' }}
          AZURE_SUBSCRIPTION_ID: ${{ steps.signing.outputs.mode == 'azure' && secrets.AZURE_SUBSCRIPTION_ID || '' }}
        run: |
          $releaseArguments = @{
            Version = $env:CLIPFORGE_VERSION
            UpdateUrl = $env:UPDATE_URL
            OutputDirectory = $env:RELEASE_DIRECTORY
            PackOnly = $true
          }

          $releaseNotes = [System.Collections.Generic.List[string]]::new()
          if ($env:SIGNING_MODE -eq "unsigned") {
            $releaseNotes.Add("# UNSIGNED PREVIEW")
            $releaseNotes.Add("")
            $releaseNotes.Add("**This is an unsigned public beta, not an official trusted release. Windows can show an unverified publisher or SmartScreen warning.**")
            $releaseNotes.Add("")
          }

          $releaseNotes.Add("## Code signing policy")
          $releaseNotes.Add("")
          $releaseNotes.Add("[Read the ClipForge Code signing policy]($env:UPDATE_URL/blob/$env:GITHUB_SHA/CODE_SIGNING_POLICY.md).")
          $releaseNotes.Add("")
          $releaseNotes.Add("Source commit: [$env:GITHUB_SHA]($env:UPDATE_URL/commit/$env:GITHUB_SHA)")

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
            $releaseNotes.Add("")
            $releaseNotes.Add("---")
            $releaseNotes.Add("")
            $releaseNotes.Add($env:RELEASE_NOTES.Trim())
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "clipforge-release-notes.md"
          [System.IO.File]::WriteAllText(
            $notesPath,
            ($releaseNotes -join [Environment]::NewLine),
            [System.Text.UTF8Encoding]::new($false))
          $releaseArguments.ReleaseNotes = $notesPath

          if ($env:SIGNING_MODE -eq "pfx") {
            $releaseArguments.SignParams = "/sha1 $env:SIGNING_THUMBPRINT /fd SHA256 /td SHA256 /tr https://timestamp.digicert.com"
          }
          elseif ($env:SIGNING_MODE -eq "azure") {
            $releaseArguments.AzureTrustedSignFile = Join-Path $env:RUNNER_TEMP "clipforge-azure-signing.json"
          }

          & .\scripts\release.ps1 @releaseArguments

      - name: Remove signing material
        if: always()
        shell: pwsh
        run: |
          foreach ($thumbprint in @($env:IMPORTED_SIGNING_THUMBPRINTS -split ';')) {
            if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
              Remove-Item -LiteralPath "Cert:\CurrentUser\My\$thumbprint" -Force -ErrorAction SilentlyContinue
            }
          }
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "clipforge-signing.pfx") -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "clipforge-azure-signing.json") -Force -ErrorAction SilentlyContinue

      - name: Verify release signatures
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
          WINDOWS_SIGNING_SUBJECT: ${{ secrets.WINDOWS_SIGNING_SUBJECT }}
        run: |
          $portablePath = Join-Path $env:RELEASE_DIRECTORY "ClipForge.Desktop-stable-Portable.zip"
          $packagePath = Join-Path $env:RELEASE_DIRECTORY "ClipForge.Desktop-$env:CLIPFORGE_VERSION-stable-full.nupkg"
          $verificationRoot = Join-Path $env:RUNNER_TEMP "clipforge-signature-verification-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          $portableRoot = Join-Path $verificationRoot "portable"
          $packageRoot = Join-Path $verificationRoot "package"
          [System.IO.Directory]::CreateDirectory($portableRoot) | Out-Null
          [System.IO.Directory]::CreateDirectory($packageRoot) | Out-Null

          Expand-Archive -LiteralPath $portablePath -DestinationPath $portableRoot
          [System.IO.Compression.ZipFile]::ExtractToDirectory($packagePath, $packageRoot)

          $signedFiles = [ordered]@{
            "Friendly installer" = Join-Path $env:RELEASE_DIRECTORY "ClipForge-Setup.exe"
            "Canonical installer" = Join-Path $env:RELEASE_DIRECTORY "ClipForge.Desktop-stable-Setup.exe"
            "Portable application" = Join-Path $portableRoot "current\ClipForge.exe"
            "Portable updater" = Join-Path $portableRoot "Update.exe"
            "Update package application" = Join-Path $packageRoot "lib\app\ClipForge.exe"
            "Update package updater" = Join-Path $packageRoot "lib\app\Squirrel.exe"
          }

          foreach ($entry in $signedFiles.GetEnumerator()) {
            if (-not (Test-Path -LiteralPath $entry.Value -PathType Leaf)) {
              throw "Release did not create $($entry.Key): $($entry.Value)"
            }
          }

          if ($env:SIGNING_MODE -eq "unsigned") {
            Write-Warning "Unsigned artifacts were structurally verified but are not eligible for trusted or stable publication. They may only be manually reviewed and published as a conspicuously labeled prerelease."
            return
          }

          $expectedSubject = $env:WINDOWS_SIGNING_SUBJECT.Trim()
          $windowsKitsRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signTool = Get-ChildItem -LiteralPath $windowsKitsRoot -Filter signtool.exe -Recurse |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signTool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          foreach ($entry in $signedFiles.GetEnumerator()) {
            $signature = Get-AuthenticodeSignature -LiteralPath $entry.Value
            Write-Host "$($entry.Key): $($signature.Status) - $($signature.SignerCertificate.Subject)"
            if ($signature.Status -ne "Valid") {
              throw "$($entry.Key) did not have a valid Authenticode signature: $($signature.StatusMessage)"
            }
            if ($signature.SignerCertificate.Subject.IndexOf(
                  $expectedSubject,
                  [System.StringComparison]::OrdinalIgnoreCase) -lt 0) {
              throw "$($entry.Key) was signed by an unexpected publisher: $($signature.SignerCertificate.Subject)"
            }
            if ($null -eq $signature.TimeStamperCertificate) {
              throw "$($entry.Key) does not contain a trusted timestamp."
            }

            & $signTool.FullName verify /pa /all /v $entry.Value
            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed for $($entry.Key)."
            }
          }

      - name: Upload to GitHub Releases
        shell: pwsh
        env:
          CLIPFORGE_VERSION: ${{ inputs.version }}
          PUBLISH_RELEASE: ${{ inputs.publish }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $publishRelease = [Convert]::ToBoolean($env:PUBLISH_RELEASE)
          if ($publishRelease -and $env:SIGNING_MODE -eq "unsigned") {
            throw "Refusing to publish an unsigned release. Configure signing or create a draft instead."
          }

          $releaseName = if ($env:SIGNING_MODE -eq "unsigned") {
            "ClipForge $env:CLIPFORGE_VERSION - UNSIGNED PREVIEW"
          }
          else {
            "ClipForge $env:CLIPFORGE_VERSION"
          }

          $uploadArguments = @(
            "tool", "run", "vpk", "--",
            "upload", "github",
            "--repoUrl", $env:UPDATE_URL,
            "--token", $env:GITHUB_TOKEN,
            "--channel", "stable",
            "--outputDir", $env:RELEASE_DIRECTORY,
            "--releaseName", $releaseName,
            "--tag", "v$env:CLIPFORGE_VERSION",
            "--targetCommitish", $env:GITHUB_SHA)

          if ($env:CLIPFORGE_VERSION.Contains("-")) {
            $uploadArguments += "--pre"
          }
          if ($publishRelease) {
            $uploadArguments += "--publish"
          }

          & dotnet @uploadArguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          & gh release upload `
            "v$env:CLIPFORGE_VERSION" `
            (Join-Path $env:RELEASE_DIRECTORY "ClipForge-Setup.exe") `
            (Join-Path $env:RELEASE_DIRECTORY "ClipForge.Desktop-stable-Portable.zip") `
            (Join-Path $env:RELEASE_DIRECTORY "SHA256SUMS.txt") `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Keep workflow artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ClipForge-${{ inputs.version }}-win-x64
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/Distribution/ClipForge-Setup.exe
            artifacts/Distribution/ClipForge.Desktop-stable-Setup.exe
            artifacts/Distribution/ClipForge.Desktop-stable-Portable.zip
            artifacts/Distribution/ClipForge.Desktop-${{ inputs.version }}-*.nupkg
            artifacts/Distribution/releases.*.json*
            artifacts/Distribution/SHA256SUMS.txt
